<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DigiBand</title>
    <meta property="og:title" content="DigiBand">
    <meta property="og:description" content="">
    <meta property="og:image" content="https://agonacat.github.io/smartdetox/icon.png">
</head>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        // 고정된 패키지 명 사용
        const pkgName = "com.onedaysoft.digiband"; 

        if (userId) {
            // AndroidManifest와 정확히 일치해야 함
            const appScheme = pkgName + "://shareid?id=" + userId;
            const playStoreUrl = "https://play.google.com/store/apps/details?id=" + pkgName;

            // 1. 앱 실행 시도
            window.location.href = appScheme;

            // 2. 앱이 없을 경우 1.5초 후 스토어로 이동
            setTimeout(function() {
                window.location.href = playStoreUrl;
            }, 1500);
        } else {
            document.body.innerText = "데이터가 없습니다.";
        }
    </script>
</body>
</html>
