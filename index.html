<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DigiBand</title>
    <meta property="og:title" content="DigiBand">
    <meta property="og:description" content="">
    <meta property="og:image" content="https://agonacat.github.io/smartdetox/icon.png">
</head>
<body>
   <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const pkgName = "com.onedaysoft.digiband";

        if (userId) {
            // 안드로이드 intent (자동 폴백 기능 제거하여 중복 실행 방지)
            const intentUrl = "intent://shareid?id=" + userId + "#Intent;scheme=" + pkgName + ";package=" + pkgName + ";end;";
            // 일반 스킴 (기타 기기용)
            const appScheme = pkgName + "://shareid?id=" + userId;
            const playStoreUrl = "https://play.google.com/store/apps/details?id=" + pkgName;

            const isAndroid = /Android/i.test(navigator.userAgent);
            const goUrl = isAndroid ? intentUrl : appScheme;

            // 1. 스토어 이동 타이머 설정 (1.5초)
            let fallbackTimer = setTimeout(function() {
                window.location.href = playStoreUrl;
            }, 3000);

            // 2. 앱이 열려서 브라우저가 화면에서 사라지면 즉시 타이머 암살(취소)
            const killTimer = function() {
                clearTimeout(fallbackTimer);
            };

            window.addEventListener('blur', killTimer);
            window.addEventListener('pagehide', killTimer);
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) killTimer();
            });

            // 3. 앱 실행 시도
            window.location.href = goUrl;

        } else {
            document.body.innerText = "잘못된 접근입니다.";
        }
    </script>
</body>
</html>
