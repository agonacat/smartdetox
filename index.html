<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        // 1. URL에서 id 파라미터 추출 (예: ?id=user123)
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        if (userId) {
            const appScheme = "myapp://share?id=" + userId;
            const playStoreUrl = "https://play.google.com/store/apps/details?id=com.your.package.name";

            // 2. 앱 실행 시도
            window.location.href = appScheme;

            // 3. 앱이 없으면 1.5초 뒤 플레이스토어로 이동
            setTimeout(function() {
                window.location.href = playStoreUrl;
            }, 1500);
        } else {
            document.body.innerText = "잘못된 접근입니다.";
        }
    </script>
</body>
</html>
